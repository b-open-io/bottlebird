<!doctype html>
<html class="dark">
    <head>
        <title>New Tab</title>
        <link rel="stylesheet" type="text/css" href="resource://ladybird/ladybird.css" />
        <script src="resource://ladybird/about-pages/wallet/tailwind.js"></script>
        <style type="text/tailwindcss">
@import "tailwindcss";

@custom-variant dark (&:is(.dark *));

:root {
  --background: oklch(1 0 0);
  --foreground: oklch(0.1450 0 0);
  --card: oklch(1 0 0);
  --card-foreground: oklch(0.1450 0 0);
  --primary: oklch(0.2050 0 0);
  --primary-foreground: oklch(0.9850 0 0);
  --secondary: oklch(0.9700 0 0);
  --secondary-foreground: oklch(0.2050 0 0);
  --muted: oklch(0.9700 0 0);
  --muted-foreground: oklch(0.5560 0 0);
  --border: oklch(0.9220 0 0);
  --input: oklch(0.9220 0 0);
  --ring: oklch(0.7080 0 0);
  --radius: 0.625rem;
}

.dark {
  --background: oklch(0.1450 0 0);
  --foreground: oklch(0.9850 0 0);
  --card: oklch(0.2050 0 0);
  --card-foreground: oklch(0.9850 0 0);
  --primary: oklch(0.9220 0 0);
  --primary-foreground: oklch(0.2050 0 0);
  --secondary: oklch(0.2690 0 0);
  --secondary-foreground: oklch(0.9850 0 0);
  --muted: oklch(0.2690 0 0);
  --muted-foreground: oklch(0.7080 0 0);
  --border: oklch(0.2750 0 0);
  --input: oklch(0.3250 0 0);
  --ring: oklch(0.5560 0 0);
}

@theme inline {
  --color-background: var(--background);
  --color-foreground: var(--foreground);
  --color-card: var(--card);
  --color-card-foreground: var(--card-foreground);
  --color-primary: var(--primary);
  --color-primary-foreground: var(--primary-foreground);
  --color-secondary: var(--secondary);
  --color-secondary-foreground: var(--secondary-foreground);
  --color-muted: var(--muted);
  --color-muted-foreground: var(--muted-foreground);
  --color-border: var(--border);
  --color-input: var(--input);
  --color-ring: var(--ring);
  --radius-lg: var(--radius);
}

@layer base {
  * { @apply border-border outline-ring/50; }
  body { @apply bg-background text-foreground; }
}
        </style>
    </head>
    <body class="flex flex-col items-center justify-center min-h-screen py-10 px-5 gap-8">
        <!-- Branding -->
        <div class="flex flex-col items-center gap-2.5">
            <div class="w-14 h-14 rounded-full bg-gradient-to-br from-chart-1 to-chart-2 shrink-0"></div>
            <span class="text-lg font-medium text-muted-foreground">Bottlebird</span>
        </div>

        <!-- Search bar -->
        <div class="w-full max-w-[560px]">
            <div class="relative">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-muted-foreground pointer-events-none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input id="search-input" class="flex h-10 w-full rounded-md border border-input bg-background pl-10 pr-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2" type="text" placeholder="Search or enter URL..." autofocus />
            </div>
        </div>

        <!-- Shortcut grid — shadcn Item component pattern -->
        <div class="grid grid-cols-4 gap-4 w-full max-w-lg">
            <a class="group flex flex-col border border-border rounded-lg overflow-hidden bg-card no-underline text-inherit hover:border-ring transition-colors" href="about:wallet">
                <div class="aspect-square w-full bg-chart-1 flex items-center justify-center text-2xl text-primary-foreground font-semibold">W</div>
                <div class="px-3 py-2.5">
                    <div class="text-sm font-medium text-card-foreground">Wallet</div>
                    <div class="text-xs text-muted-foreground">Dashboard</div>
                </div>
            </a>
            <a class="group flex flex-col border border-border rounded-lg overflow-hidden bg-card no-underline text-inherit hover:border-ring transition-colors" href="about:wallet#ordinals">
                <div class="aspect-square w-full bg-chart-2 flex items-center justify-center text-2xl text-primary-foreground font-semibold">O</div>
                <div class="px-3 py-2.5">
                    <div class="text-sm font-medium text-card-foreground">Ordinals</div>
                    <div class="text-xs text-muted-foreground">Your NFTs</div>
                </div>
            </a>
            <a class="group flex flex-col border border-border rounded-lg overflow-hidden bg-card no-underline text-inherit hover:border-ring transition-colors" href="about:wallet#tokens">
                <div class="aspect-square w-full bg-chart-3 flex items-center justify-center text-2xl text-primary-foreground font-semibold">T</div>
                <div class="px-3 py-2.5">
                    <div class="text-sm font-medium text-card-foreground">Tokens</div>
                    <div class="text-xs text-muted-foreground">BSV21</div>
                </div>
            </a>
            <a class="group flex flex-col border border-border rounded-lg overflow-hidden bg-card no-underline text-inherit hover:border-ring transition-colors" href="about:wallet#market">
                <div class="aspect-square w-full bg-chart-4 flex items-center justify-center text-2xl text-primary-foreground font-semibold">M</div>
                <div class="px-3 py-2.5">
                    <div class="text-sm font-medium text-card-foreground">Market</div>
                    <div class="text-xs text-muted-foreground">Browse</div>
                </div>
            </a>
            <a class="group flex flex-col border border-border rounded-lg overflow-hidden bg-card no-underline text-inherit hover:border-ring transition-colors" href="about:wallet#identity">
                <div class="aspect-square w-full bg-chart-5 flex items-center justify-center text-2xl text-primary-foreground font-semibold">I</div>
                <div class="px-3 py-2.5">
                    <div class="text-sm font-medium text-card-foreground">Identity</div>
                    <div class="text-xs text-muted-foreground">BAP Profile</div>
                </div>
            </a>
            <a class="group flex flex-col border border-border rounded-lg overflow-hidden bg-card no-underline text-inherit hover:border-ring transition-colors" href="about:settings">
                <div class="aspect-square w-full bg-muted flex items-center justify-center text-2xl text-muted-foreground font-semibold">S</div>
                <div class="px-3 py-2.5">
                    <div class="text-sm font-medium text-card-foreground">Settings</div>
                    <div class="text-xs text-muted-foreground">Configure</div>
                </div>
            </a>
            <a class="group flex flex-col border border-border rounded-lg overflow-hidden bg-card no-underline text-inherit hover:border-ring transition-colors" href="about:wallet#chat">
                <div class="aspect-square w-full bg-chart-1 flex items-center justify-center text-2xl text-primary-foreground font-semibold">C</div>
                <div class="px-3 py-2.5">
                    <div class="text-sm font-medium text-card-foreground">BitChat</div>
                    <div class="text-xs text-muted-foreground">Messages</div>
                </div>
            </a>
            <a class="group flex flex-col border border-border rounded-lg overflow-hidden bg-card no-underline text-inherit hover:border-ring transition-colors" href="about:wallet#publish">
                <div class="aspect-square w-full bg-chart-3 flex items-center justify-center text-2xl text-primary-foreground font-semibold">P</div>
                <div class="px-3 py-2.5">
                    <div class="text-sm font-medium text-card-foreground">Publish</div>
                    <div class="text-xs text-muted-foreground">Inscribe</div>
                </div>
            </a>
        </div>

        <script src="resource://ladybird/about-pages/newtab/newtab.js" type="module"></script>
    </body>
</html>
