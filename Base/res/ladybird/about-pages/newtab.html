<!doctype html>
<html>
    <head>
        <title>New Tab</title>
        <link rel="stylesheet" type="text/css" href="resource://ladybird/ladybird.css" />
        <script src="resource://ladybird/about-pages/wallet/tailwind.js"></script>
        <style type="text/tailwindcss">
@import "tailwindcss";
        </style>
    </head>
    <body class="flex flex-col items-center justify-center min-h-screen py-10 px-5 gap-8 bg-zinc-950 text-zinc-100">
        <!-- Branding -->
        <div class="flex flex-col items-center gap-2.5">
            <div class="w-14 h-14 rounded-full bg-gradient-to-br from-blue-500 to-violet-500 shrink-0"></div>
            <span class="text-lg font-medium text-zinc-400">Bottlebird</span>
        </div>

        <!-- Search bar -->
        <div class="w-full max-w-[560px]">
            <div class="flex items-center gap-3 bg-zinc-900 border border-zinc-800 rounded-lg px-4 py-3.5 transition-colors focus-within:border-blue-500 focus-within:shadow-md focus-within:shadow-black/20">
                <svg class="shrink-0 w-4 h-4 text-zinc-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input id="search-input" class="flex-1 bg-transparent border-none outline-none text-sm text-zinc-100 font-sans placeholder:text-zinc-500" type="text" placeholder="Search or enter URL..." autofocus />
            </div>
        </div>

        <!-- Shortcut grid -->
        <div class="grid grid-cols-4 gap-4 justify-center" style="grid-template-columns: repeat(4, 80px);">
            <a class="flex flex-col items-center gap-2 py-4 px-2 bg-zinc-800 rounded-xl cursor-pointer no-underline text-inherit text-xs hover:bg-zinc-700 transition-colors" href="about:wallet">
                <div class="w-10 h-10 rounded-[10px] flex items-center justify-center text-lg text-white font-semibold bg-blue-500">W</div>
                <span class="text-center leading-tight">Wallet</span>
            </a>
            <a class="flex flex-col items-center gap-2 py-4 px-2 bg-zinc-800 rounded-xl cursor-pointer no-underline text-inherit text-xs hover:bg-zinc-700 transition-colors" href="about:wallet#ordinals">
                <div class="w-10 h-10 rounded-[10px] flex items-center justify-center text-lg text-white font-semibold bg-violet-500">O</div>
                <span class="text-center leading-tight">Ordinals</span>
            </a>
            <a class="flex flex-col items-center gap-2 py-4 px-2 bg-zinc-800 rounded-xl cursor-pointer no-underline text-inherit text-xs hover:bg-zinc-700 transition-colors" href="about:wallet#tokens">
                <div class="w-10 h-10 rounded-[10px] flex items-center justify-center text-lg text-white font-semibold bg-yellow-500">T</div>
                <span class="text-center leading-tight">Tokens</span>
            </a>
            <a class="flex flex-col items-center gap-2 py-4 px-2 bg-zinc-800 rounded-xl cursor-pointer no-underline text-inherit text-xs hover:bg-zinc-700 transition-colors" href="about:wallet#market">
                <div class="w-10 h-10 rounded-[10px] flex items-center justify-center text-lg text-white font-semibold bg-green-500">M</div>
                <span class="text-center leading-tight">Market</span>
            </a>
            <a class="flex flex-col items-center gap-2 py-4 px-2 bg-zinc-800 rounded-xl cursor-pointer no-underline text-inherit text-xs hover:bg-zinc-700 transition-colors" href="about:wallet#identity">
                <div class="w-10 h-10 rounded-[10px] flex items-center justify-center text-lg text-white font-semibold bg-pink-500">I</div>
                <span class="text-center leading-tight">Identity</span>
            </a>
            <a class="flex flex-col items-center gap-2 py-4 px-2 bg-zinc-800 rounded-xl cursor-pointer no-underline text-inherit text-xs hover:bg-zinc-700 transition-colors" href="about:settings">
                <div class="w-10 h-10 rounded-[10px] flex items-center justify-center text-lg text-white font-semibold bg-gray-500">S</div>
                <span class="text-center leading-tight">Settings</span>
            </a>
            <a class="flex flex-col items-center gap-2 py-4 px-2 bg-zinc-800 rounded-xl cursor-pointer no-underline text-inherit text-xs hover:bg-zinc-700 transition-colors" href="about:wallet#chat">
                <div class="w-10 h-10 rounded-[10px] flex items-center justify-center text-lg text-white font-semibold bg-emerald-500">C</div>
                <span class="text-center leading-tight">BitChat</span>
            </a>
            <a class="flex flex-col items-center gap-2 py-4 px-2 bg-zinc-800 rounded-xl cursor-pointer no-underline text-inherit text-xs hover:bg-zinc-700 transition-colors" href="about:wallet#publish">
                <div class="w-10 h-10 rounded-[10px] flex items-center justify-center text-lg text-white font-semibold bg-rose-500">P</div>
                <span class="text-center leading-tight">Publish</span>
            </a>
        </div>

        <script src="resource://ladybird/about-pages/newtab/newtab.js" type="module"></script>
    </body>
</html>
