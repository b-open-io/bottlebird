<!doctype html>
<html>
    <head>
        <title>New Tab</title>
        <link rel="stylesheet" type="text/css" href="resource://ladybird/ladybird.css" />
        <style>
            @media (prefers-color-scheme: light) {
                :root {
                    --card-background-color: #f9f9f9;
                    --border-color: #dcdde1;
                    --input-background-color: white;
                    --shortcut-bg: #f0f2f5;
                    --shortcut-bg-hover: #e4e6eb;
                    --search-shadow: rgba(0, 0, 0, 0.08);
                    --logo-gradient-start: #3b82f6;
                    --logo-gradient-end: #8b5cf6;
                }
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    --card-background-color: #2c2c2c;
                    --border-color: #3d3d3d;
                    --input-background-color: #333;
                    --shortcut-bg: #333;
                    --shortcut-bg-hover: #444;
                    --search-shadow: rgba(0, 0, 0, 0.3);
                    --logo-gradient-start: #60a5fa;
                    --logo-gradient-end: #a78bfa;
                }
            }

            * { box-sizing: border-box; }

            body {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 40px 20px;
                gap: 32px;
            }

            /* Branding */
            .branding {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }

            .logo {
                width: 56px;
                height: 56px;
                border-radius: 50%;
                background: linear-gradient(135deg, var(--logo-gradient-start) 0%, var(--logo-gradient-end) 100%);
                flex-shrink: 0;
            }

            .brand-name {
                font-size: 18px;
                font-weight: 500;
                opacity: 0.7;
            }

            /* Search bar */
            .search-container {
                width: 100%;
                max-width: 560px;
            }

            .search-bar {
                display: flex;
                align-items: center;
                gap: 12px;
                background-color: var(--card-background-color);
                border: 1px solid var(--border-color);
                border-radius: 8px;
                padding: 14px 16px;
                transition: border-color 0.15s, box-shadow 0.15s;
            }

            .search-bar:focus-within {
                border-color: var(--violet-100);
                box-shadow: 0 2px 8px var(--search-shadow);
            }

            .search-icon {
                flex-shrink: 0;
                width: 16px;
                height: 16px;
                opacity: 0.5;
            }

            .search-input {
                flex: 1;
                background: none;
                border: none;
                outline: none;
                font-size: 14px;
                color: var(--text-color);
                font-family: sans-serif;
            }

            .search-input::placeholder {
                opacity: 0.5;
            }

            /* Shortcuts grid */
            .shortcuts {
                display: grid;
                grid-template-columns: repeat(4, 80px);
                gap: 16px;
                justify-content: center;
            }

            .shortcut {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 8px;
                padding: 16px 8px;
                background: var(--shortcut-bg);
                border-radius: 12px;
                cursor: pointer;
                text-decoration: none;
                color: inherit;
                font-size: 12px;
                transition: background 0.15s;
            }

            .shortcut:hover {
                background: var(--shortcut-bg-hover);
            }

            .shortcut-icon {
                width: 40px;
                height: 40px;
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
                color: white;
                font-weight: 600;
            }

            .shortcut-label {
                text-align: center;
                line-height: 1.2;
            }
        </style>
    </head>
    <body>
        <!-- Branding -->
        <div class="branding">
            <div class="logo"></div>
            <span class="brand-name">Bottlebird</span>
        </div>

        <!-- Search bar -->
        <div class="search-container">
            <div class="search-bar">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input id="search-input" class="search-input" type="text" placeholder="Search or enter URL..." autofocus />
            </div>
        </div>

        <!-- Shortcut grid -->
        <div class="shortcuts">
            <a class="shortcut" href="about:wallet">
                <div class="shortcut-icon" style="background: #3b82f6;">W</div>
                <span class="shortcut-label">Wallet</span>
            </a>
            <a class="shortcut" href="1sat://ordinals">
                <div class="shortcut-icon" style="background: #8b5cf6;">O</div>
                <span class="shortcut-label">Ordinals</span>
            </a>
            <a class="shortcut" href="1sat://tokens">
                <div class="shortcut-icon" style="background: #eab308;">T</div>
                <span class="shortcut-label">Tokens</span>
            </a>
            <a class="shortcut" href="1sat://market">
                <div class="shortcut-icon" style="background: #22c55e;">M</div>
                <span class="shortcut-label">Market</span>
            </a>
            <a class="shortcut" href="1sat://identity">
                <div class="shortcut-icon" style="background: #ec4899;">I</div>
                <span class="shortcut-label">Identity</span>
            </a>
            <a class="shortcut" href="about:settings">
                <div class="shortcut-icon" style="background: #6b7280;">S</div>
                <span class="shortcut-label">Settings</span>
            </a>
            <a class="shortcut" href="1sat://chat">
                <div class="shortcut-icon" style="background: #10b981;">C</div>
                <span class="shortcut-label">BitChat</span>
            </a>
            <a class="shortcut" href="1sat://publish">
                <div class="shortcut-icon" style="background: #f43f5e;">P</div>
                <span class="shortcut-label">Publish</span>
            </a>
        </div>

        <script src="resource://ladybird/about-pages/newtab/newtab.js" type="module"></script>
    </body>
</html>
