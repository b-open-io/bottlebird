<!doctype html>
<html class="dark">
    <head>
        <title>New Tab</title>
        <link rel="stylesheet" type="text/css" href="resource://ladybird/ladybird.css" />
        <script src="resource://ladybird/about-pages/wallet/tailwind.js"></script>
        <style type="text/tailwindcss">
@import "tailwindcss";

@custom-variant dark (&:is(.dark *));

:root {
  --background: oklch(1 0 0);
  --foreground: oklch(0.1450 0 0);
  --card: oklch(1 0 0);
  --card-foreground: oklch(0.1450 0 0);
  --primary: oklch(0.2050 0 0);
  --primary-foreground: oklch(0.9850 0 0);
  --secondary: oklch(0.9700 0 0);
  --secondary-foreground: oklch(0.2050 0 0);
  --muted: oklch(0.9700 0 0);
  --muted-foreground: oklch(0.5560 0 0);
  --border: oklch(0.9220 0 0);
  --input: oklch(0.9220 0 0);
  --ring: oklch(0.7080 0 0);
  --radius: 0.625rem;
}

.dark {
  --background: oklch(0.1450 0 0);
  --foreground: oklch(0.9850 0 0);
  --card: oklch(0.2050 0 0);
  --card-foreground: oklch(0.9850 0 0);
  --primary: oklch(0.9220 0 0);
  --primary-foreground: oklch(0.2050 0 0);
  --secondary: oklch(0.2690 0 0);
  --secondary-foreground: oklch(0.9850 0 0);
  --muted: oklch(0.2690 0 0);
  --muted-foreground: oklch(0.7080 0 0);
  --border: oklch(0.2750 0 0);
  --input: oklch(0.3250 0 0);
  --ring: oklch(0.5560 0 0);
}

@theme inline {
  --color-background: var(--background);
  --color-foreground: var(--foreground);
  --color-card: var(--card);
  --color-card-foreground: var(--card-foreground);
  --color-primary: var(--primary);
  --color-primary-foreground: var(--primary-foreground);
  --color-secondary: var(--secondary);
  --color-secondary-foreground: var(--secondary-foreground);
  --color-muted: var(--muted);
  --color-muted-foreground: var(--muted-foreground);
  --color-border: var(--border);
  --color-input: var(--input);
  --color-ring: var(--ring);
  --radius-lg: var(--radius);
}

@layer base {
  * { @apply border-border outline-ring/50; }
  body { @apply bg-background text-foreground; }
}
        </style>
    </head>
    <body class="flex flex-col items-center justify-center min-h-screen py-10 px-5 gap-8">
        <!-- Branding -->
        <div class="flex flex-col items-center gap-2.5">
            <div class="w-14 h-14 rounded-full bg-gradient-to-br from-chart-1 to-chart-2 shrink-0"></div>
            <span class="text-lg font-medium text-muted-foreground">Bottlebird</span>
        </div>

        <!-- Search bar -->
        <div class="w-full max-w-[560px]">
            <div class="flex items-center gap-3 bg-card border border-input rounded-lg px-4 py-3.5 transition-colors focus-within:border-ring focus-within:ring-1 focus-within:ring-ring">
                <svg class="shrink-0 w-4 h-4 text-muted-foreground" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input id="search-input" class="flex-1 bg-transparent border-none outline-none text-sm text-foreground font-sans placeholder:text-muted-foreground" type="text" placeholder="Search or enter URL..." autofocus />
            </div>
        </div>

        <!-- Shortcut grid -->
        <div class="grid grid-cols-4 gap-4 justify-center" style="grid-template-columns: repeat(4, 80px);">
            <a class="flex flex-col items-center gap-2 py-4 px-2 bg-secondary rounded-xl cursor-pointer no-underline text-inherit text-xs hover:bg-accent transition-colors" href="about:wallet">
                <div class="w-10 h-10 rounded-[10px] flex items-center justify-center text-lg text-primary-foreground font-semibold bg-chart-1">W</div>
                <span class="text-center leading-tight">Wallet</span>
            </a>
            <a class="flex flex-col items-center gap-2 py-4 px-2 bg-secondary rounded-xl cursor-pointer no-underline text-inherit text-xs hover:bg-accent transition-colors" href="about:wallet#ordinals">
                <div class="w-10 h-10 rounded-[10px] flex items-center justify-center text-lg text-primary-foreground font-semibold bg-chart-2">O</div>
                <span class="text-center leading-tight">Ordinals</span>
            </a>
            <a class="flex flex-col items-center gap-2 py-4 px-2 bg-secondary rounded-xl cursor-pointer no-underline text-inherit text-xs hover:bg-accent transition-colors" href="about:wallet#tokens">
                <div class="w-10 h-10 rounded-[10px] flex items-center justify-center text-lg text-primary-foreground font-semibold bg-chart-3">T</div>
                <span class="text-center leading-tight">Tokens</span>
            </a>
            <a class="flex flex-col items-center gap-2 py-4 px-2 bg-secondary rounded-xl cursor-pointer no-underline text-inherit text-xs hover:bg-accent transition-colors" href="about:wallet#market">
                <div class="w-10 h-10 rounded-[10px] flex items-center justify-center text-lg text-primary-foreground font-semibold bg-chart-4">M</div>
                <span class="text-center leading-tight">Market</span>
            </a>
            <a class="flex flex-col items-center gap-2 py-4 px-2 bg-secondary rounded-xl cursor-pointer no-underline text-inherit text-xs hover:bg-accent transition-colors" href="about:wallet#identity">
                <div class="w-10 h-10 rounded-[10px] flex items-center justify-center text-lg text-primary-foreground font-semibold bg-chart-5">I</div>
                <span class="text-center leading-tight">Identity</span>
            </a>
            <a class="flex flex-col items-center gap-2 py-4 px-2 bg-secondary rounded-xl cursor-pointer no-underline text-inherit text-xs hover:bg-accent transition-colors" href="about:settings">
                <div class="w-10 h-10 rounded-[10px] flex items-center justify-center text-lg text-primary-foreground font-semibold bg-muted">S</div>
                <span class="text-center leading-tight">Settings</span>
            </a>
            <a class="flex flex-col items-center gap-2 py-4 px-2 bg-secondary rounded-xl cursor-pointer no-underline text-inherit text-xs hover:bg-accent transition-colors" href="about:wallet#chat">
                <div class="w-10 h-10 rounded-[10px] flex items-center justify-center text-lg text-primary-foreground font-semibold bg-chart-1">C</div>
                <span class="text-center leading-tight">BitChat</span>
            </a>
            <a class="flex flex-col items-center gap-2 py-4 px-2 bg-secondary rounded-xl cursor-pointer no-underline text-inherit text-xs hover:bg-accent transition-colors" href="about:wallet#publish">
                <div class="w-10 h-10 rounded-[10px] flex items-center justify-center text-lg text-primary-foreground font-semibold bg-chart-3">P</div>
                <span class="text-center leading-tight">Publish</span>
            </a>
        </div>

        <script src="resource://ladybird/about-pages/newtab/newtab.js" type="module"></script>
    </body>
</html>
