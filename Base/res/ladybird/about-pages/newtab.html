<!doctype html>
<html class="dark">
    <head>
        <title>New Tab</title>
        <link rel="stylesheet" type="text/css" href="resource://ladybird/ladybird.css" />
        <style>
:root {
  --background: oklch(1 0 0);
  --foreground: oklch(0.1450 0 0);
  --card: oklch(1 0 0);
  --card-foreground: oklch(0.1450 0 0);
  --primary: oklch(0.2050 0 0);
  --primary-foreground: oklch(0.9850 0 0);
  --secondary: oklch(0.9700 0 0);
  --secondary-foreground: oklch(0.2050 0 0);
  --muted: oklch(0.9700 0 0);
  --muted-foreground: oklch(0.5560 0 0);
  --border: oklch(0.9220 0 0);
  --input: oklch(0.9220 0 0);
  --ring: oklch(0.7080 0 0);
  --chart-1: oklch(0.8100 0.1000 252);
  --chart-2: oklch(0.6200 0.1900 260);
  --chart-3: oklch(0.5500 0.2200 263);
  --chart-4: oklch(0.4900 0.2200 264);
  --chart-5: oklch(0.4200 0.1800 266);
  --radius: 0.625rem;
  --font-sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif;
}

.dark {
  --background: oklch(0.1450 0 0);
  --foreground: oklch(0.9850 0 0);
  --card: oklch(0.2050 0 0);
  --card-foreground: oklch(0.9850 0 0);
  --primary: oklch(0.9220 0 0);
  --primary-foreground: oklch(0.2050 0 0);
  --secondary: oklch(0.2690 0 0);
  --secondary-foreground: oklch(0.9850 0 0);
  --muted: oklch(0.2690 0 0);
  --muted-foreground: oklch(0.7080 0 0);
  --border: oklch(0.2750 0 0);
  --input: oklch(0.3250 0 0);
  --ring: oklch(0.5560 0 0);
  --chart-1: oklch(0.8100 0.1000 252);
  --chart-2: oklch(0.6200 0.1900 260);
  --chart-3: oklch(0.5500 0.2200 263);
  --chart-4: oklch(0.4900 0.2200 264);
  --chart-5: oklch(0.4200 0.1800 266);
}

/* ── Base ─────────────────────────────────────────────────── */
* { box-sizing: border-box; }
h1, h2, h3, h4 { letter-spacing: -0.025em; line-height: 1.2; }
body {
    background: var(--background);
    color: var(--foreground);
    font-family: var(--font-sans);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 1.5rem 1.25rem;
    gap: 1.5rem;
    margin: 0;
}

/* ── Branding ─────────────────────────────────────────────── */
.branding {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.625rem;
}
.branding-icon {
    width: 3.5rem;
    height: 3.5rem;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--chart-1), var(--chart-2));
    flex-shrink: 0;
}
.branding-name {
    font-size: 1.125rem;
    line-height: 1.75rem;
    font-weight: 500;
    letter-spacing: -0.025em;
    color: var(--muted-foreground);
}

/* ── Search bar (shadcn Input pattern) ───────────────────── */
.search-wrap {
    width: 100%;
    max-width: 35rem;
}
.search-bar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    height: 2.5rem;
    width: 100%;
    border-radius: calc(var(--radius) - 0.125rem);
    border: 1px solid var(--input);
    background: var(--background);
    padding: 0 0.75rem;
    transition: box-shadow 0.15s;
}
.search-bar svg {
    width: 1rem;
    height: 1rem;
    color: var(--muted-foreground);
    flex-shrink: 0;
}
.search-bar input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-size: 0.875rem;
    line-height: 1.25rem;
    color: var(--foreground);
    text-align: left;
}
.search-bar input::placeholder {
    color: var(--muted-foreground);
    text-align: left;
}
.search-bar:focus-within {
    box-shadow: 0 0 0 0.125rem var(--ring);
}

/* ── Shortcut grid ────────────────────────────────────────── */
.shortcut-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    width: 100%;
    max-width: 32rem;
}
.shortcut-card {
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--card);
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s;
}
.shortcut-card:hover { border-color: var(--ring); }
.shortcut-thumb {
    aspect-ratio: 1 / 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    color: var(--primary-foreground);
    font-weight: 600;
}
.shortcut-label { padding: 0.75rem; }
.shortcut-label-title {
    font-size: 0.875rem;
    line-height: 1.25rem;
    font-weight: 500;
    color: var(--card-foreground);
}
.shortcut-label-sub {
    font-size: 0.75rem;
    line-height: 1rem;
    color: var(--muted-foreground);
}

/* ── Shortcut thumb background variants ──────────────────── */
.thumb-chart-1 { background: var(--chart-1); }
.thumb-chart-2 { background: var(--chart-2); }
.thumb-chart-3 { background: var(--chart-3); }
.thumb-chart-4 { background: var(--chart-4); }
.thumb-chart-5 { background: var(--chart-5); }
.thumb-muted   { background: var(--muted); }
.thumb-muted .thumb-letter { color: var(--muted-foreground); }

/* ── Focus-visible rings ─────────────────────────────────── */
button:focus-visible, a:focus-visible, input:focus-visible {
    outline: 0.125rem solid var(--ring);
    outline-offset: 0.125rem;
}
        </style>
    </head>
    <body>
        <!-- Branding -->
        <div class="branding">
            <div class="branding-icon"></div>
            <span class="branding-name">Bottlebird</span>
        </div>

        <!-- Search bar -->
        <div class="search-wrap">
            <div class="search-bar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input id="search-input" type="text" placeholder="Search or enter URL..." autofocus />
            </div>
        </div>

        <!-- Shortcut grid -->
        <div class="shortcut-grid">
            <a class="shortcut-card" href="about:wallet">
                <div class="shortcut-thumb thumb-chart-1">W</div>
                <div class="shortcut-label">
                    <div class="shortcut-label-title">Wallet</div>
                    <div class="shortcut-label-sub">Dashboard</div>
                </div>
            </a>
            <a class="shortcut-card" href="about:wallet#ordinals">
                <div class="shortcut-thumb thumb-chart-2">O</div>
                <div class="shortcut-label">
                    <div class="shortcut-label-title">Ordinals</div>
                    <div class="shortcut-label-sub">Your NFTs</div>
                </div>
            </a>
            <a class="shortcut-card" href="about:wallet#tokens">
                <div class="shortcut-thumb thumb-chart-3">T</div>
                <div class="shortcut-label">
                    <div class="shortcut-label-title">Tokens</div>
                    <div class="shortcut-label-sub">BSV21</div>
                </div>
            </a>
            <a class="shortcut-card" href="about:wallet#market">
                <div class="shortcut-thumb thumb-chart-4">M</div>
                <div class="shortcut-label">
                    <div class="shortcut-label-title">Market</div>
                    <div class="shortcut-label-sub">Browse</div>
                </div>
            </a>
            <a class="shortcut-card" href="about:wallet#apps">
                <div class="shortcut-thumb thumb-chart-5">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                </div>
                <div class="shortcut-label">
                    <div class="shortcut-label-title">Apps</div>
                    <div class="shortcut-label-sub">Catalog</div>
                </div>
            </a>
            <a class="shortcut-card" href="about:wallet#identity">
                <div class="shortcut-thumb thumb-chart-1">I</div>
                <div class="shortcut-label">
                    <div class="shortcut-label-title">Identity</div>
                    <div class="shortcut-label-sub">BAP Profile</div>
                </div>
            </a>
            <a class="shortcut-card" href="about:settings">
                <div class="shortcut-thumb thumb-muted">
                    <span class="thumb-letter">S</span>
                </div>
                <div class="shortcut-label">
                    <div class="shortcut-label-title">Settings</div>
                    <div class="shortcut-label-sub">Configure</div>
                </div>
            </a>
            <a class="shortcut-card" href="about:wallet#chat">
                <div class="shortcut-thumb thumb-chart-1">C</div>
                <div class="shortcut-label">
                    <div class="shortcut-label-title">BitChat</div>
                    <div class="shortcut-label-sub">Messages</div>
                </div>
            </a>
            <a class="shortcut-card" href="about:wallet#publish">
                <div class="shortcut-thumb thumb-chart-3">P</div>
                <div class="shortcut-label">
                    <div class="shortcut-label-title">Publish</div>
                    <div class="shortcut-label-sub">Inscribe</div>
                </div>
            </a>
        </div>

        <script src="resource://ladybird/about-pages/newtab/newtab.js" type="module"></script>
    </body>
</html>
