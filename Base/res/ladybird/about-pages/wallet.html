<!doctype html>
<html>
    <head>
        <title>Wallet</title>
        <link rel="stylesheet" type="text/css" href="resource://ladybird/ladybird.css" />
        <style>
            @media (prefers-color-scheme: light) {
                :root {
                    --card-background-color: #f9f9f9;
                    --card-header-background-color: #f0f2f5;

                    --input-background-color: white;

                    --border-color: #dcdde1;

                    --status-connected: #2ecc71;
                    --status-disconnected: #e74c3c;
                }
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    --card-background-color: #2c2c2c;
                    --card-header-background-color: #252525;

                    --border-color: #3d3d3d;

                    --status-connected: #27ae60;
                    --status-disconnected: #c0392b;
                }
            }

            * {
                box-sizing: border-box;
            }

            body {
                max-width: 800px;

                margin: 0 auto;
                padding: 20px;
            }

            header {
                display: flex;
                align-items: center;

                margin-bottom: 30px;
            }

            header h1 {
                font-size: 20px;
            }

            header img {
                height: 48px;
                margin-right: 10px;
                float: left;
            }

            .card {
                background-color: var(--card-background-color);

                border-radius: 8px;
                margin-bottom: 20px;

                overflow: hidden;
            }

            .card-header {
                background-color: var(--card-header-background-color);

                border-bottom: 1px solid var(--border-color);
                padding: 15px 20px;

                font-size: 16px;
                font-weight: 500;
            }

            .card-body {
                padding: 20px;
            }

            .card-group {
                margin-bottom: 20px;
            }

            .card-group:last-child {
                margin-bottom: 0;
            }

            .inline-container {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 10px;
            }

            .description {
                margin-bottom: 10px;

                font-size: 14px;
                opacity: 0.7;
            }

            label {
                display: block;
                margin-bottom: 8px;

                font-size: 14px;
            }

            input[type="text"],
            input[type="url"],
            input[type="number"] {
                background-color: var(--input-background-color);

                width: 100%;
                border: 1px solid var(--border-color);
            }

            hr {
                height: 1px;
                background-color: var(--border-color);
                border: none;
            }

            .card-body > hr {
                margin: 0 8px 16px 8px;
            }

            .status-indicator {
                display: inline-block;
                width: 10px;
                height: 10px;
                border-radius: 50%;
                margin-right: 8px;
            }

            .status-indicator.connected {
                background-color: var(--status-connected);
            }

            .status-indicator.disconnected {
                background-color: var(--status-disconnected);
            }

            .balance-display {
                font-size: 28px;
                font-weight: 600;
                margin-bottom: 4px;
            }

            .balance-unconfirmed {
                font-size: 14px;
                opacity: 0.6;
            }

            .address-display {
                font-family: Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
                font-size: 13px;

                background-color: var(--card-header-background-color);
                border: 1px solid var(--border-color);
                border-radius: 4px;
                padding: 12px;

                word-break: break-all;
                user-select: all;
            }

            .address-placeholder {
                font-size: 14px;
                opacity: 0.5;
                font-style: italic;
            }

            .send-form {
                display: flex;
                flex-direction: column;
                gap: 16px;
            }

            .button-row {
                display: flex;
                justify-content: flex-end;
                gap: 10px;
            }

            .message {
                font-size: 14px;
                padding: 10px;
                border-radius: 4px;
                margin-top: 10px;
            }

            .message.error {
                background-color: rgba(231, 76, 60, 0.15);
                color: var(--status-disconnected);
            }

            .message.success {
                background-color: rgba(46, 204, 113, 0.15);
                color: var(--status-connected);
            }
        </style>
    </head>
    <body>
        <header>
            <picture>
                <source
                    srcset="resource://icons/128x128/app-browser.png"
                    media="(prefers-color-scheme: dark)"
                />
                <img src="resource://icons/128x128/app-browser-dark.png" />
            </picture>
            <h1>Wallet</h1>
        </header>

        <div class="card">
            <div class="card-header">Status</div>
            <div class="card-body">
                <div class="card-group inline-container">
                    <span>
                        <span id="status-indicator" class="status-indicator disconnected"></span>
                        <span id="status-text">Disconnected</span>
                    </span>
                    <label class="inline-container" style="margin-bottom: 0;">
                        <span>Enable Wallet</span>
                        <input id="wallet-enabled-toggle" type="checkbox" switch />
                    </label>
                </div>

                <hr />

                <div class="card-group">
                    <label for="backend-url">Backend URL</label>
                    <p class="description">The ordinals API endpoint used for wallet operations.</p>
                    <input id="backend-url" type="url" placeholder="https://ordinals.gorillapool.io" />
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">Balance</div>
            <div class="card-body">
                <div id="balance-confirmed" class="balance-display">0 sat</div>
                <div id="balance-unconfirmed" class="balance-unconfirmed">0 sat unconfirmed</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">Receive</div>
            <div class="card-body">
                <div class="card-group">
                    <label>Your Address</label>
                    <div id="receive-address" class="address-placeholder">No address available</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">Send</div>
            <div class="card-body">
                <div class="send-form">
                    <div class="card-group">
                        <label for="send-recipient">Recipient Address</label>
                        <input id="send-recipient" type="text" placeholder="Enter BSV address" />
                    </div>
                    <div class="card-group">
                        <label for="send-amount">Amount (satoshis)</label>
                        <input id="send-amount" type="number" min="1" placeholder="0" />
                    </div>
                    <div class="button-row">
                        <button id="send-button" class="primary-button">Send</button>
                    </div>
                    <div id="send-message" class="hidden"></div>
                </div>
            </div>
        </div>

        <script src="resource://ladybird/about-pages/wallet/wallet.js" type="module"></script>
    </body>
</html>
